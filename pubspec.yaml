name: weather_app
description: Weather App - L3GL ISI 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0
  json_annotation: ^4.8.1
  
  # State Management
  provider: ^6.1.1
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  retrofit_generator: ^8.1.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/
